<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartFill A5 — Autofill-on-Focus Test</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    h1   { font-size: 1.2rem; margin-bottom: 4px; }
    p    { color: #555; font-size: .875rem; margin-top: 0; }
    .row { margin-bottom: 18px; }
    label { display: block; font-size:.8rem; color:#333; margin-bottom:4px; }
    input { width:100%; padding:8px; box-sizing:border-box; border:1px solid #ccc;
            border-radius:4px; font-size:.95rem; }
    input:focus { outline: 2px solid #6366f1; }
    .badge-host { position: relative; }
    pre  { background:#f4f4f4; padding:12px; border-radius:6px;
           font-size:.78rem; overflow:auto; }
    button { padding:8px 16px; background:#6366f1; color:#fff;
             border:none; border-radius:4px; cursor:pointer; }
    button:hover { background:#4f46e5; }
    #log { max-height:180px; overflow-y:auto; }
  </style>
</head>
<body>
  <h1>SmartFill A5 — Autofill-on-Focus</h1>
  <p>No extension needed. Click any field — it should fill from the mock profile below.</p>

  <div class="row"><label>Full Name</label>
    <div class="badge-host"><input id="f-name"  type="text"  placeholder="Full Name"></div>
  </div>
  <div class="row"><label>Email Address</label>
    <div class="badge-host"><input id="f-email" type="email" placeholder="Email Address"></div>
  </div>
  <div class="row"><label>Phone Number</label>
    <div class="badge-host"><input id="f-phone" type="tel"   placeholder="Phone Number"></div>
  </div>
  <div class="row"><label>College</label>
    <div class="badge-host"><input id="f-college" type="text" placeholder="College"></div>
  </div>
  <div class="row"><label>LinkedIn</label>
    <div class="badge-host"><input id="f-li"   type="url"   placeholder="LinkedIn"></div>
  </div>
  <div class="row"><label>GitHub</label>
    <div class="badge-host"><input id="f-gh"   type="url"   placeholder="GitHub"></div>
  </div>

  <button onclick="clearAll()">Clear all fields</button>
  <hr>
  <p><strong>Mock Profile (edit freely):</strong></p>
  <pre id="profile-display"></pre>
  <pre id="log">— events will appear here —</pre>

  <script>
    // ── Mock profile ──────────────────────────────────────
    const PROFILE = {
      full_name:  'Ayush Tiwari',
      email:      'ayushtiwari102003@gmail.com',
      phone:      '+91-9XXXXXXXXX',
      college:    'NIT Jamshedpur',
      degree:     'B.Tech CSE',
      grad_year:  '2025',
      city:       'Jamshedpur',
      state:      'Jharkhand',
      country:    'India',
      linkedin:   'https://linkedin.com/in/ayushtiwari18',
      github:     'https://github.com/ayushtiwari18',
      portfolio:  '',
      skills:     'JavaScript, React, Node.js, Python',
    };
    document.getElementById('profile-display').textContent = JSON.stringify(PROFILE, null, 2);

    // ── Label → profile key map (mirrors profileMatcher.js) ──
    const LABEL_MAP = [
      { keys: ['full name','full_name','your name','name'],           key: 'full_name'  },
      { keys: ['email','e-mail','email address','mail'],              key: 'email'      },
      { keys: ['phone','mobile','contact','phone number'],            key: 'phone'      },
      { keys: ['college','university','institution','school'],        key: 'college'    },
      { keys: ['linkedin','linkedin profile'],                        key: 'linkedin'   },
      { keys: ['github','github profile'],                            key: 'github'     },
    ];

    function resolveKey(label) {
      const n = label.toLowerCase();
      for (const e of LABEL_MAP)
        if (e.keys.some(k => n.includes(k) || k.includes(n))) return e.key;
      return null;
    }

    // ── Native setter (React-safe) ────────────────────────
    function nativeSet(el, val) {
      const desc = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype,'value');
      if (desc && desc.set) desc.set.call(el, val);
      else el.value = val;
      el.dispatchEvent(new Event('input',  { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
    }

    // ── Badge ─────────────────────────────────────────────
    function showBadge(el) {
      const b = document.createElement('span');
      b.textContent  = 'SmartFill ✓';
      b.style.cssText = 'position:absolute;right:8px;top:50%;transform:translateY(-50%);'
        + 'font-size:10px;color:#22c55e;background:rgba(0,0,0,.06);'
        + 'padding:2px 6px;border-radius:4px;pointer-events:none;z-index:9;font-family:sans-serif';
      el.parentElement.appendChild(b);
      setTimeout(() => b.remove(), 2500);
    }

    // ── Log helper ────────────────────────────────────────
    const logEl = document.getElementById('log');
    function log(msg) {
      const line = document.createElement('div');
      line.textContent = new Date().toLocaleTimeString() + '  ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ── Wire up all fields ────────────────────────────────
    const fields = [
      { el: document.getElementById('f-name'),    label: 'full name'      },
      { el: document.getElementById('f-email'),   label: 'email address'  },
      { el: document.getElementById('f-phone'),   label: 'phone number'   },
      { el: document.getElementById('f-college'), label: 'college'        },
      { el: document.getElementById('f-li'),      label: 'linkedin'       },
      { el: document.getElementById('f-gh'),      label: 'github'         },
    ];

    for (const { el, label } of fields) {
      el.addEventListener('focus', () => {
        if (el.value.trim()) return;
        const k = resolveKey(label);
        const v = k ? PROFILE[k] : null;
        if (!v) { log(`[SKIP] no profile match for "${label}"`); return; }
        nativeSet(el, v);
        showBadge(el);
        log(`[FILL] "${label}" → "${v}"`);
      });
    }

    function clearAll() {
      fields.forEach(({ el }) => { el.value = ''; });
      logEl.innerHTML = '— cleared —';
    }
  </script>
</body>
</html>
