<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartFill — Profile Setup</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>

<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <span class="logo">💼 SmartFill</span>
      <span class="version">Profile Setup</span>
    </div>
  </header>

  <main class="main">

    <!-- Toast -->
    <div id="toast" class="toast" aria-live="polite"></div>

    <form id="profile-form" autocomplete="off" novalidate>

      <!-- ── Section 1: Personal Info ────────────────────────────── -->
      <section class="card">
        <h2 class="section-title">👤 Personal Information</h2>
        <div class="grid">

          <div class="field">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Ayush Tiwari" />
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" />
          </div>

          <div class="field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" />
          </div>

          <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" />
          </div>

          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select…</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </div>

        </div>
      </section>

      <!-- ── Section 2: Contact & Links ───────────────────────────── -->
      <section class="card">
        <h2 class="section-title">🔗 Contact &amp; Links</h2>
        <div class="grid">

          <div class="field field--full">
            <label for="address">Street Address</label>
            <input type="text" id="address" name="address" placeholder="123 Main Street, Apt 4B" />
          </div>

          <div class="field">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="Bhopal" />
          </div>

          <div class="field">
            <label for="state">State / Province</label>
            <input type="text" id="state" name="state" placeholder="Madhya Pradesh" />
          </div>

          <div class="field">
            <label for="pincode">PIN / ZIP Code</label>
            <input type="text" id="pincode" name="pincode" placeholder="462001" />
          </div>

          <div class="field">
            <label for="country">Country</label>
            <input type="text" id="country" name="country" placeholder="India" />
          </div>

          <div class="field field--full">
            <label for="linkedin">LinkedIn URL</label>
            <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/yourprofile" />
          </div>

          <div class="field">
            <label for="github">GitHub URL</label>
            <input type="url" id="github" name="github" placeholder="https://github.com/yourusername" />
          </div>

          <div class="field">
            <label for="portfolio">Portfolio / Website</label>
            <input type="url" id="portfolio" name="portfolio" placeholder="https://yoursite.dev" />
          </div>

        </div>
      </section>

      <!-- ── Section 3: Education ──────────────────────────────── -->
      <section class="card">
        <h2 class="section-title">🎓 Education</h2>
        <div class="grid">

          <div class="field field--full">
            <label for="college">College / University</label>
            <input type="text" id="college" name="college" placeholder="RGPV University" />
          </div>

          <div class="field">
            <label for="degree">Degree</label>
            <select id="degree" name="degree">
              <option value="">Select…</option>
              <option value="B.Tech">B.Tech</option>
              <option value="B.E.">B.E.</option>
              <option value="B.Sc">B.Sc</option>
              <option value="BCA">BCA</option>
              <option value="MCA">MCA</option>
              <option value="M.Tech">M.Tech</option>
              <option value="MBA">MBA</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="field">
            <label for="branch">Branch / Major</label>
            <input type="text" id="branch" name="branch" placeholder="Computer Science &amp; Engineering" />
          </div>

          <div class="field">
            <label for="gradYear">Graduation Year</label>
            <input type="number" id="gradYear" name="gradYear" placeholder="2025" min="2000" max="2035" />
          </div>

          <div class="field">
            <label for="cgpa">CGPA / Percentage</label>
            <input type="text" id="cgpa" name="cgpa" placeholder="8.5 / 85%" />
          </div>

        </div>
      </section>

      <!-- ── Section 4: Experience & Skills ──────────────────────── -->
      <section class="card">
        <h2 class="section-title">💼 Experience &amp; Skills</h2>
        <div class="grid">

          <div class="field">
            <label for="currentRole">Current / Last Role</label>
            <input type="text" id="currentRole" name="currentRole" placeholder="Software Engineer Intern" />
          </div>

          <div class="field">
            <label for="currentCompany">Current / Last Company</label>
            <input type="text" id="currentCompany" name="currentCompany" placeholder="Infosys" />
          </div>

          <div class="field">
            <label for="experience">Years of Experience</label>
            <input type="text" id="experience" name="experience" placeholder="0 (Fresher) / 2 years" />
          </div>

          <div class="field">
            <label for="noticePeriod">Notice Period</label>
            <input type="text" id="noticePeriod" name="noticePeriod" placeholder="Immediate / 30 days" />
          </div>

          <div class="field field--full">
            <label for="skills">Key Skills <span class="hint">(comma separated)</span></label>
            <input type="text" id="skills" name="skills" placeholder="JavaScript, React, Node.js, Python" />
          </div>

          <div class="field field--full">
            <label for="summary">Professional Summary <span class="hint">(optional)</span></label>
            <textarea id="summary" name="summary" rows="4"
              placeholder="Brief 2-3 sentence summary about yourself..."></textarea>
          </div>

        </div>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button type="button" id="btn-reset" class="btn btn--ghost">Reset Form</button>
        <button type="submit" id="btn-save" class="btn btn--primary">💾 Save Profile</button>
      </div>

    </form>
  </main>

  <footer class="footer">
    Your data is stored locally in your browser. Nothing is sent to any server.
  </footer>

</div>

<script src="options.js" type="module"></script>
</body>
</html>
